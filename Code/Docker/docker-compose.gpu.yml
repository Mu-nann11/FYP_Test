services:
  fiji-stitcher:
    build:
      context: ../..
      dockerfile: Code/Docker/Dockerfile
      args:
        DOWNLOAD_FIJI: "1"
    container_name: fiji-stitcher-gpu
    working_dir: /app
    runtime: nvidia
    environment:
      FIJI_PATH: /opt/Fiji.app
      FIJI_EXE: /opt/Fiji.app/ImageJ-linux64
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ../..:/app
      - ../../Raw_Data:/data/Raw_Data
      - ../../results:/results
      - ../../fiji_config.json:/app/fiji_config.json
      - cellpose_cache:/root/.cellpose
      - torch_cache:/root/.cache/torch
      - cjdk_cache:/root/.cache/cjdk
    command: ["micromamba", "run", "-n", "fiji-stitcher", "python", "Code/Pipeline/main.py", "--batch"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  cellpose_cache:
  torch_cache:
  cjdk_cache:
